<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Gradiente dourado arcos externos -->
    <linearGradient id="goldArc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8c97a"/>
      <stop offset="40%" stop-color="#c8a96e"/>
      <stop offset="70%" stop-color="#f0d98a"/>
      <stop offset="100%" stop-color="#b8902a"/>
    </linearGradient>

    <!-- Gradiente dourado infinito -->
    <linearGradient id="goldInfinity" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b8902a"/>
      <stop offset="30%" stop-color="#e8c97a"/>
      <stop offset="60%" stop-color="#c8a96e"/>
      <stop offset="100%" stop-color="#f0d98a"/>
    </linearGradient>

    <!-- Gradiente verde escuro -->
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a5c48"/>
      <stop offset="100%" stop-color="#0d3d2e"/>
    </linearGradient>

    <!-- Gradiente folhas verdes -->
    <linearGradient id="leafGreen" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d3d2e"/>
      <stop offset="60%" stop-color="#2a7a5a"/>
      <stop offset="100%" stop-color="#4a9a72"/>
    </linearGradient>

    <!-- Gradiente folhas douradas -->
    <linearGradient id="leafGold" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c8a96e"/>
      <stop offset="100%" stop-color="#f0d98a"/>
    </linearGradient>

    <!-- Filtro brilho suave -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ─── ARCOS CIRCULARES EXTERNOS ─── -->
  <!-- Arco dourado externo principal -->
  <circle cx="200" cy="185" r="118" fill="none" stroke="url(#goldArc)" stroke-width="3.5" stroke-dasharray="680 60" stroke-dashoffset="30" stroke-linecap="round"/>

  <!-- Arco verde escuro interno -->
  <circle cx="200" cy="185" r="106" fill="none" stroke="#1a5c48" stroke-width="2.5" stroke-dasharray="580 80" stroke-dashoffset="-20" stroke-linecap="round"/>

  <!-- Arco dourado fino interno -->
  <circle cx="200" cy="185" r="96" fill="none" stroke="url(#goldArc)" stroke-width="1.5" stroke-dasharray="520 80" stroke-dashoffset="40" stroke-linecap="round"/>

  <!-- ─── SÍMBOLO DO INFINITO ─── -->
  <!-- Construído com dois loops bezier interligados -->
  <!-- Loop esquerdo -->
  <path d="
    M 200 195
    C 195 175, 170 158, 148 162
    C 122 167, 110 182, 110 195
    C 110 208, 122 223, 148 228
    C 170 232, 195 215, 200 195
  " fill="none" stroke="url(#goldInfinity)" stroke-width="9" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Loop direito -->
  <path d="
    M 200 195
    C 205 175, 230 158, 252 162
    C 278 167, 290 182, 290 195
    C 290 208, 278 223, 252 228
    C 230 232, 205 215, 200 195
  " fill="none" stroke="url(#goldInfinity)" stroke-width="9" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Cruzamento verde escuro no centro (sobreposição) -->
  <path d="M 193 188 C 196 191, 200 195, 204 198" fill="none" stroke="#1a5c48" stroke-width="9.5" stroke-linecap="round"/>
  <path d="M 204 188 C 201 191, 200 195, 196 198" fill="none" stroke="#1a5c48" stroke-width="9.5" stroke-linecap="round"/>

  <!-- Repassagem dourada nas extremidades para dar brilho -->
  <path d="M 148 162 C 122 167, 110 182, 110 195" fill="none" stroke="#f0d98a" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <path d="M 252 162 C 278 167, 290 182, 290 195" fill="none" stroke="#f0d98a" stroke-width="4" stroke-linecap="round" opacity="0.5"/>

  <!-- ─── FOLHAS BROTANDO DO CENTRO ─── -->
  <!-- Folha central (maior, dourada) -->
  <path d="M 200 185 C 198 165, 192 145, 200 128 C 208 145, 202 165, 200 185 Z" fill="url(#leafGold)" opacity="0.9"/>

  <!-- Folha esquerda grande (verde) -->
  <path d="M 197 178 C 180 165, 168 148, 172 132 C 182 148, 188 165, 197 178 Z" fill="url(#leafGreen)" opacity="0.95"/>

  <!-- Folha direita grande (verde) -->
  <path d="M 203 178 C 220 165, 232 148, 228 132 C 218 148, 212 165, 203 178 Z" fill="url(#leafGreen)" opacity="0.95"/>

  <!-- Folha esquerda pequena (dourada) -->
  <path d="M 190 172 C 174 162, 165 147, 170 133 C 178 148, 184 162, 190 172 Z" fill="url(#leafGold)" opacity="0.7"/>

  <!-- Folha direita pequena (dourada) -->
  <path d="M 210 172 C 226 162, 235 147, 230 133 C 222 148, 216 162, 210 172 Z" fill="url(#leafGold)" opacity="0.7"/>

  <!-- Nervura central das folhas -->
  <line x1="200" y1="185" x2="200" y2="130" stroke="#c8a96e" stroke-width="0.8" opacity="0.6"/>
  <line x1="197" y1="178" x2="172" y2="133" stroke="#2a7a5a" stroke-width="0.6" opacity="0.5"/>
  <line x1="203" y1="178" x2="228" y2="133" stroke="#2a7a5a" stroke-width="0.6" opacity="0.5"/>

  <!-- ─── TIPOGRAFIA ─── -->
  <!-- RITUAL -->
  <text x="200" y="330" text-anchor="middle"
    font-family="'Trebuchet MS', 'Gill Sans', Arial, sans-serif"
    font-size="38" font-weight="700" letter-spacing="6"
    fill="#1a5c48">RITUAL</text>

  <!-- DIÁRIO (dourado) -->
  <text x="200" y="330" text-anchor="middle"
    font-family="'Trebuchet MS', 'Gill Sans', Arial, sans-serif"
    font-size="38" font-weight="700" letter-spacing="6"
    fill="url(#goldArc)" dx="115">DIÁRIO</text>

  <!-- Linha separadora -->
  <line x1="120" y1="345" x2="280" y2="345" stroke="url(#goldArc)" stroke-width="0.8" opacity="0.5"/>

  <!-- Prosperidade Financeira -->
  <text x="200" y="362" text-anchor="middle"
    font-family="'Trebuchet MS', Arial, sans-serif"
    font-size="13" font-weight="400" letter-spacing="3"
    fill="#1a5c48" opacity="0.8">PROSPERIDADE FINANCEIRA</text>

  <!-- Método REMEC -->
  <text x="200" y="380" text-anchor="middle"
    font-family="'Trebuchet MS', Arial, sans-serif"
    font-size="13" font-weight="600" letter-spacing="3"
    fill="#c8a96e">MÉTODO REMEC</text>
</svg>
